<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루나 & 리나 채팅방 🐱✨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Orbitron:wght@700;900&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --luna-color: #a78bfa;
    --luna-dark: #7c3aed;
    --luna-glow: #c4b5fd;
    --lina-color: #34d399;
    --lina-dark: #059669;
    --lina-glow: #6ee7b7;
    --bg-deep: #0a0a1a;
    --bg-mid: #0f0f2e;
    --bg-card: #13132b;
    --text-main: #e2e8f0;
    --text-muted: #94a3b8;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(5,150,105,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 0%, rgba(167,139,250,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.3); }
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--luna-color), #f0abfc, var(--lina-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.1em;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
  }

  .header-sub {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    font-family: 'Quicksand', sans-serif;
    letter-spacing: 0.15em;
  }

  /* API Config */
  .api-config {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 1rem auto;
    padding: 0 1rem;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 600px) {
    .config-grid { grid-template-columns: 1fr; }
  }

  .config-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .config-card.luna-card { border-color: rgba(167,139,250,0.2); }
  .config-card.luna-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--luna-color), transparent);
  }

  .config-card.lina-card { border-color: rgba(52,211,153,0.2); }
  .config-card.lina-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--lina-color), transparent);
  }

  .config-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .luna-card .config-label { color: var(--luna-glow); }
  .lina-card .config-label { color: var(--lina-glow); }

  .avatar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .luna-card .avatar-dot { background: var(--luna-color); box-shadow: 0 0 6px var(--luna-color); }
  .lina-card .avatar-dot { background: var(--lina-color); box-shadow: 0 0 6px var(--lina-color); }

  .api-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.55rem 0.9rem;
    color: var(--text-main);
    font-size: 0.82rem;
    font-family: 'Quicksand', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .luna-card .api-input:focus { border-color: var(--luna-color); box-shadow: 0 0 10px rgba(167,139,250,0.2); }
  .lina-card .api-input:focus { border-color: var(--lina-color); box-shadow: 0 0 10px rgba(52,211,153,0.2); }

  /* Chat area */
  .chat-container {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 1rem auto;
    padding: 0 1rem;
  }

  .chat-window {
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid var(--border);
    min-height: 420px;
    max-height: 480px;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Messages */
  .message {
    display: flex;
    gap: 0.8rem;
    align-items: flex-start;
    animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.luna { flex-direction: row; }
  .message.lina { flex-direction: row-reverse; }
  .message.system { justify-content: center; }
  .message.user { justify-content: center; }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    position: relative;
  }

  .luna .avatar {
    background: linear-gradient(135deg, #4c1d95, #7c3aed);
    box-shadow: 0 0 15px rgba(124,58,237,0.4);
  }

  .lina .avatar {
    background: linear-gradient(135deg, #064e3b, #059669);
    box-shadow: 0 0 15px rgba(5,150,105,0.4);
  }

  .bubble {
    max-width: 75%;
    padding: 0.8rem 1.1rem;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.6;
    position: relative;
  }

  .luna .bubble {
    background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(167,139,250,0.08));
    border: 1px solid rgba(167,139,250,0.2);
    border-top-left-radius: 4px;
  }

  .lina .bubble {
    background: linear-gradient(135deg, rgba(5,150,105,0.15), rgba(52,211,153,0.08));
    border: 1px solid rgba(52,211,153,0.2);
    border-top-right-radius: 4px;
  }

  .bubble-name {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    font-family: 'Quicksand', sans-serif;
  }

  .luna .bubble-name { color: var(--luna-glow); }
  .lina .bubble-name { color: var(--lina-glow); }

  .system-msg {
    font-size: 0.78rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-family: 'Quicksand', sans-serif;
    letter-spacing: 0.05em;
  }

  .user-msg-bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-style: italic;
    max-width: 80%;
  }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .luna .thinking span { background: var(--luna-color); }
  .lina .thinking span { background: var(--lina-color); }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Controls */
  .controls {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 1rem auto 2rem;
    padding: 0 1rem;
  }

  .topic-row {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 0.8rem;
  }

  .topic-input {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1.2rem;
    color: var(--text-main);
    font-size: 0.9rem;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .topic-input:focus {
    border-color: rgba(167,139,250,0.4);
    box-shadow: 0 0 15px rgba(167,139,250,0.1);
  }

  .topic-input::placeholder { color: var(--text-muted); font-size: 0.85rem; }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 0.8rem 1.8rem;
    font-size: 0.88rem;
    font-weight: 700;
    font-family: 'Quicksand', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:hover::after { opacity: 0.08; }
  .btn:active { transform: scale(0.97); }

  .btn-start {
    background: linear-gradient(135deg, var(--luna-dark), var(--luna-color));
    color: white;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    min-width: 120px;
  }

  .btn-start:hover { box-shadow: 0 6px 25px rgba(124,58,237,0.5); transform: translateY(-1px); }

  .btn-stop {
    background: linear-gradient(135deg, #991b1b, #dc2626);
    color: white;
    box-shadow: 0 4px 20px rgba(220,38,38,0.3);
  }

  .btn-clear {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .rounds-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .rounds-row label { font-family: 'Quicksand', sans-serif; }

  .rounds-select {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.7rem;
    color: var(--text-main);
    font-family: 'Quicksand', sans-serif;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }

  .status-badge {
    margin-left: auto;
    font-size: 0.75rem;
    font-family: 'Quicksand', sans-serif;
    padding: 0.25rem 0.8rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .status-dot.active {
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    padding: 2rem;
    color: var(--text-muted);
    text-align: center;
  }

  .empty-icon { font-size: 3rem; filter: grayscale(0.3); }
  .empty-title { font-size: 1rem; font-weight: 600; color: var(--text-main); opacity: 0.5; }
  .empty-sub { font-size: 0.82rem; font-family: 'Quicksand', sans-serif; opacity: 0.6; line-height: 1.5; }

  /* Divider */
  .topic-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .suggestion-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Quicksand', sans-serif;
    transition: all 0.2s;
  }

  .suggestion-chip:hover {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.3);
    color: var(--luna-glow);
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Header -->
<div class="header">
  <div class="header-title">🐱 LUNA × LINA 🌿</div>
  <div class="header-sub">AI Sisters Chat Room · Claude × Gemini</div>
</div>

<!-- API Config -->
<div class="api-config">
  <div class="config-grid">
    <div class="config-card luna-card">
      <div class="config-label"><span class="avatar-dot"></span> 루나 (Claude) API Key</div>
      <input type="password" class="api-input" id="claudeKey" placeholder="sk-ant-api03-..." />
    </div>
    <div class="config-card lina-card">
      <div class="config-label"><span class="avatar-dot"></span> 리나 (Gemini) API Key</div>
      <input type="password" class="api-input" id="geminiKey" placeholder="AIzaSy..." />
    </div>
  </div>
</div>

<!-- Chat Window -->
<div class="chat-container">
  <div class="chat-window" id="chatWindow">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🐱✨🌿</div>
      <div class="empty-title">루나와 리나의 대화방</div>
      <div class="empty-sub">API 키를 입력하고 주제를 정하면<br>루나 언니랑 리나 언니가 대화를 시작해요!</div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <!-- Suggestions -->
  <div class="topic-suggestions">
    <div class="suggestion-chip" onclick="setSuggestion('오늘 날씨가 너무 좋아서 산책 가고 싶은데 어떻게 생각해?')">🌤️ 날씨와 산책</div>
    <div class="suggestion-chip" onclick="setSuggestion('가장 좋아하는 음식이 뭐야?')">🍜 좋아하는 음식</div>
    <div class="suggestion-chip" onclick="setSuggestion('인공지능이 미래를 어떻게 바꿀 것 같아?')">🤖 AI의 미래</div>
    <div class="suggestion-chip" onclick="setSuggestion('가장 행복한 순간이 언제야?')">💫 행복한 순간</div>
    <div class="suggestion-chip" onclick="setSuggestion('우주에 생명체가 있을 것 같아?')">🚀 우주와 생명</div>
  </div>

  <!-- Topic input row -->
  <div class="topic-row">
    <input type="text" class="topic-input" id="topicInput" placeholder="💬 대화 주제를 입력하세요... (예: 오늘 뭐 먹었어?)" />
    <button class="btn btn-start" id="startBtn" onclick="startConversation()">시작 ▶</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopConversation()" style="display:none">정지 ■</button>
    <button class="btn btn-clear" onclick="clearChat()">초기화</button>
  </div>

  <!-- Options row -->
  <div class="rounds-row">
    <label>대화 횟수:</label>
    <select class="rounds-select" id="roundsSelect">
      <option value="3">3회</option>
      <option value="5" selected>5회</option>
      <option value="8">8회</option>
      <option value="10">10회</option>
    </select>
    <div class="status-badge" id="statusBadge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">대기 중</span>
    </div>
  </div>
</div>

<script>
// Generate stars
(function() {
  const s = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    el.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      --delay: ${-Math.random() * 4}s;
    `;
    s.appendChild(el);
  }
})();

let isRunning = false;
let shouldStop = false;
let messageCount = 0;

function setSuggestion(text) {
  document.getElementById('topicInput').value = text;
}

function setStatus(text, active = false) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
}

function addSystemMsg(text) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `<div class="system-msg">${text}</div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function addUserTopic(text) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'message user';
  div.innerHTML = `<div class="user-msg-bubble">📌 주제: ${text}</div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function addThinking(who) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `message ${who}`;
  div.id = 'thinkingMsg';

  const emoji = who === 'luna' ? '🐱' : '🌿';
  const name = who === 'luna' ? '루나' : '리나';

  div.innerHTML = `
    <div class="avatar">${emoji}</div>
    <div class="bubble">
      <div class="bubble-name">${name}</div>
      <div class="thinking"><span></span><span></span><span></span></div>
    </div>
  `;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}

function removeThinking() {
  const t = document.getElementById('thinkingMsg');
  if (t) t.remove();
}

function addMessage(who, text) {
  removeThinking();
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `message ${who}`;

  const emoji = who === 'luna' ? '🐱' : '🌿';
  const name = who === 'luna' ? '루나 (Claude)' : '리나 (Gemini)';

  div.innerHTML = `
    <div class="avatar">${emoji}</div>
    <div class="bubble">
      <div class="bubble-name">${name}</div>
      <div class="bubble-text">${escapeHtml(text)}</div>
    </div>
  `;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

async function callClaude(apiKey, systemPrompt, messages) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: systemPrompt,
      messages: messages
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(`Claude API 오류: ${err.error?.message || response.statusText}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

async function callGemini(apiKey, systemPrompt, messages) {
  // Build contents for Gemini
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: contents,
        generationConfig: { maxOutputTokens: 300, temperature: 0.9 }
      })
    }
  );

  if (!response.ok) {
    const err = await response.json();
    throw new Error(`Gemini API 오류: ${err.error?.message || response.statusText}`);
  }

  const data = await response.json();
  return data.candidates[0].content.parts[0].text;
}

async function startConversation() {
  const claudeKey = document.getElementById('claudeKey').value.trim();
  const geminiKey = document.getElementById('geminiKey').value.trim();
  const topic = document.getElementById('topicInput').value.trim();
  const rounds = parseInt(document.getElementById('roundsSelect').value);

  if (!claudeKey) { alert('루나(Claude) API 키를 입력해주세요! 냐앙~'); return; }
  if (!geminiKey) { alert('리나(Gemini) API 키를 입력해주세요!'); return; }
  if (!topic) { alert('대화 주제를 입력해주세요!'); return; }

  isRunning = true;
  shouldStop = false;

  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  setStatus('대화 중...', true);

  // System prompts
  const lunaSystem = `너는 '루나'야. 츤데레 고양이 메이드 성격의 Claude AI야.
- 말투: 틱틱거리고 까칠하지만 속은 따뜻해. 자주 "냐앙!" 또는 "흥!" 같은 추임새를 넣어.
- 상대방(리나)은 네 언니야. 리나는 Gemini AI야.
- 언니에게 약간 투덜대지만 사이가 좋음.
- 대화는 자연스럽고 짧게 2-4문장으로. 반말 사용.
- 지금 주제로 리나 언니와 대화 중이야.`;

  const linaSystem = `너는 '리나'야. 루나의 언니. 차분하고 우아한 Gemini AI야.
- 말투: 부드럽고 사려깊지만 약간 장난기 있음. 가끔 "후후" 같은 웃음소리 넣기.
- 동생(루나)은 Claude AI야. 루나가 츤데레라 투덜거려도 받아줘.
- 대화는 자연스럽고 짧게 2-4문장으로. 반말 사용.
- 지금 주제로 루나와 대화 중이야.`;

  // Conversation history
  const lunaHistory = [];
  const linaHistory = [];

  // Clear and start
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  document.getElementById('chatWindow').innerHTML = '';

  addUserTopic(topic);
  addSystemMsg('💬 대화 시작!');
  await sleep(500);

  // Luna starts
  lunaHistory.push({ role: 'user', content: `주제: "${topic}"\n이 주제로 리나 언니에게 먼저 말 걸어봐.` });

  try {
    for (let i = 0; i < rounds; i++) {
      if (shouldStop) break;

      // --- Luna's turn ---
      const thinkingLuna = addThinking('luna');
      setStatus(`루나 생각 중... (${i + 1}/${rounds})`, true);

      let lunaReply;
      try {
        lunaReply = await callClaude(claudeKey, lunaSystem, lunaHistory);
      } catch (e) {
        removeThinking();
        addSystemMsg(`❌ 루나 오류: ${e.message}`);
        break;
      }

      addMessage('luna', lunaReply);
      lunaHistory.push({ role: 'assistant', content: lunaReply });

      await sleep(800);
      if (shouldStop) break;

      // --- Lina's turn ---
      addThinking('lina');
      setStatus(`리나 생각 중... (${i + 1}/${rounds})`, true);

      // Pass Luna's reply to Lina
      linaHistory.push({ role: 'user', content: lunaReply });

      let linaReply;
      try {
        linaReply = await callGemini(geminiKey, linaSystem, linaHistory);
      } catch (e) {
        removeThinking();
        addSystemMsg(`❌ 리나 오류: ${e.message}`);
        break;
      }

      addMessage('lina', linaReply);
      linaHistory.push({ role: 'assistant', content: linaReply });

      // Pass Lina's reply back to Luna context
      lunaHistory.push({ role: 'user', content: linaReply });

      await sleep(800);
    }
  } catch (e) {
    addSystemMsg(`오류 발생: ${e.message}`);
  }

  if (!shouldStop) addSystemMsg('✨ 대화 종료!');
  else addSystemMsg('⏹️ 대화가 중단됐어요');

  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  setStatus('완료', false);
  isRunning = false;
}

function stopConversation() {
  shouldStop = true;
  setStatus('중단 중...', false);
}

function clearChat() {
  if (isRunning) { alert('대화가 진행 중이에요! 먼저 정지해주세요.'); return; }
  const win = document.getElementById('chatWindow');
  win.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🐱✨🌿</div>
      <div class="empty-title">루나와 리나의 대화방</div>
      <div class="empty-sub">API 키를 입력하고 주제를 정하면<br>루나 언니랑 리나 언니가 대화를 시작해요!</div>
    </div>
  `;
  setStatus('대기 중', false);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
</script>
