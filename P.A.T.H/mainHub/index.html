<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P.A.T.H - Command</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-overlay">
        <!-- Top Bar -->
        <header class="hud-header">
            <div class="hud-left">
                <div class="profile-unit">
                    <div id="badge-char" class="char-avatar">U</div>
                    <div class="char-info">
                        <div id="hud-univ" class="info-univ">YONSEI UNIV.</div>
                        <div id="hud-pct" class="info-rank">TOP 0.00%</div>
                    </div>
                </div>
            </div>
            
            <div class="hud-center">
                <div class="search-command">
                    <span class="cmd-icon">_</span>
                    <input type="text" id="global-search" placeholder="SEARCH DATABASE..." oninput="onSearch(this.value)">
                </div>
            </div>

            <div class="hud-right">
                <div class="stat-group">
                    <div class="stat-unit"><span class="label">GOLD</span> <span id="hud-gold" class="val">0</span></div>
                    <div class="stat-unit"><span class="label">TIME</span> <span id="hud-hours" class="val">00:00</span></div>
                    <div class="stat-unit hidden"><span class="label">TICKET</span> <span id="hud-tickets" class="val">0</span></div>
                </div>
                <div class="sys-controls">
                    <button class="sys-btn" onclick="togglePanel('panel-notif')">
                        LOGS <span id="notif-badge" class="dot hidden"></span>
                    </button>
                    <button class="sys-btn" onclick="doLogout()">EXIT</button>
                </div>
            </div>
        </header>

        <!-- Right Side Controls -->
        <div class="hud-side-right">
            <div class="map-controls">
                <button onclick="panMap(0, 150)">▲</button>
                <div class="row">
                    <button onclick="panMap(150, 0)">◀</button>
                    <button onclick="panMap(-150, 0)">▶</button>
                </div>
                <button onclick="panMap(0, -150)">▼</button>
                <div class="sep"></div>
                <button onclick="zoomMap(0.12)">+</button>
                <button onclick="zoomMap(-0.12)">-</button>
            </div>
            <button class="sys-btn rank-btn" onclick="togglePanel('panel-rank')">RANK</button>
        </div>

        <!-- Bottom Center -->
        <div class="hud-bottom-center">
            <button id="btn-enter-path" class="action-main" onclick="goToTimer()">INITIALIZE PATH</button>
            <div class="status-line">READY TO IMMERSE</div>
        </div>

        <!-- Return Home Button -->
        <button id="btn-return-home" class="floating-fab" onclick="returnToHome()">
            <span>HOME</span>
        </button>
    </div>

    <!-- Map Layer -->
    <div id="world-container">
        <div id="map-layer">
            <div class="building" id="my-castle" onclick="openEstate()">
                <div class="b-marker"></div>
                <img id="my-castle-img" src="/P.A.T.H/assets/castle_main.png" alt="Estate">
                <div class="building-label mine" id="my-castle-label">MY DOMAIN</div>
            </div>
        </div>
    </div>

    <!-- Panels -->
    <!-- Rank Panel -->
    <div class="glass-panel hidden" id="panel-rank">
        <div class="panel-head">
            <h3>LEADERBOARD</h3>
            <div class="tabs">
                <button class="tab active" onclick="switchRankTab('total', this)">TOTAL</button>
                <button class="tab" onclick="switchRankTab('today', this)">TODAY</button>
            </div>
            <button class="close-btn" onclick="togglePanel('panel-rank')">×</button>
        </div>
        <div class="panel-content" id="rank-list">LOADING DATA...</div>
    </div>

    <!-- Notif Panel -->
    <div class="glass-panel hidden" id="panel-notif">
        <div class="panel-head">
            <h3>LOGS</h3>
            <button class="close-btn" onclick="togglePanel('panel-notif')">×</button>
        </div>
        <div class="panel-content" id="notif-list">NO NEW LOGS</div>
    </div>

    <!-- Interior -->
    <div class="full-overlay hidden" id="castle-interior">
        <div class="overlay-head">
            <h2>INTERNAL STRUCTURE</h2>
            <button class="back-btn" onclick="closeInterior()">RETURN TO MAP</button>
        </div>
        <div class="overlay-body" id="interior-body"></div>
    </div>

    <!-- User Modal -->
    <div class="modal-backdrop hidden" id="modal-user">
        <div class="modal-card">
            <h3 id="user-modal-title">TARGET INFO</h3>
            <div id="user-modal-body" class="modal-content"></div>
            <div class="modal-foot">
                <button class="danger-btn" id="btn-invade" onclick="doInvade()">INVADE</button>
                <button class="cancel-btn" onclick="closeModal('modal-user')">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
